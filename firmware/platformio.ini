; Claude Code / Codex desk buddy — Guition ESP32-4848S040 (4.0" 480x480, ST7701 RGB, GT911 touch)
; Build:   pio run -e esp32-4848S040CIY3
; Flash:   pio run -e esp32-4848S040CIY3 -t upload
; Monitor: pio device monitor
;
; Board variant note: this board ships as CIY1 or CIY3 (different ST7701 init).
; If the screen is blank or color-shifted, switch the env to esp32-4848S040CIY1.

[env]
; pioarduino fork: arduino-esp32 3.1.x / IDF 5.3+, required by ESP32_Display_Panel
platform = https://github.com/pioarduino/platform-espressif32/releases/download/53.03.13/platform-espressif32.zip
framework = arduino
monitor_speed = 115200
monitor_rts = 0
monitor_dtr = 0
monitor_filters = esp32_exception_decoder
build_unflags = -std=gnu++11
build_flags =
    -std=gnu++17
    -I include   ; expose esp_panel_*_conf.h to the ESP32_Display_Panel library build
    -Ofast
    -Wall
    '-D BOARD_NAME="${this.board}"'
    '-D CORE_DEBUG_LEVEL=ARDUHAL_LOG_LEVEL_INFO'
    '-D LV_CONF_PATH="${platformio.include_dir}/lv_conf.h"'
lib_deps =
    https://github.com/esp-arduino-libs/ESP32_Display_Panel.git
    https://github.com/esp-arduino-libs/esp-lib-utils.git
    https://github.com/esp-arduino-libs/ESP32_IO_Expander.git
    lvgl/lvgl@^9.1.0
    bblanchon/ArduinoJson@^7.2.0

[env:esp32-4848S040CIY3]
board = esp32-4848S040CIY3

[env:esp32-4848S040CIY1]
board = esp32-4848S040CIY1
